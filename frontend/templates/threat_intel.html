<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🛰️ Threat Intelligence</span>
        <a href="/" class="btn btn-outline-info">Dashboard</a>
    </div>
</nav>
<div class="container py-4">
    <div class="card dark-card">
        <div class="card-body">
            <h2 class="section-title">Enrichment Feed</h2>
            <div class="table-responsive">
                <table class="table table-dark">
                    <thead><tr><th>Source</th><th>Indicator</th><th>Severity</th><th>Score</th><th>Details</th></tr></thead>
                    <tbody>
                    {% for item in threat_intel %}
                    <tr><td>{{ item.source }}</td><td>{{ item.indicator }}</td><td>{{ item.severity }}</td><td>{{ item.score }}</td><td>{{ item.details }}</td></tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
