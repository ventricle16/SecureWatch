<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureWatch{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">🛡️ SecureWatch Enterprise</span>
        <div class="d-flex align-items-center gap-2">
            <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/incidents">Incidents</a>
            <a class="btn btn-outline-light btn-sm" href="/reports">Reports</a>
            <a class="btn btn-outline-light btn-sm" href="/mitre">MITRE</a>
            <a class="btn btn-outline-light btn-sm" href="/threat-intel">Threat Intel</a>
        </div>
    </div>
</nav>
<div class="container py-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
