<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureWatch Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">👤 SecureWatch User Administration</span>
        <a href="/" class="btn btn-outline-info">Back to Dashboard</a>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card dark-card">
                <div class="card-body">
                    <h3 class="section-title">Create User</h3>
                    <form action="/users/create" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input class="form-control" type="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" name="role">
                                <option value="analyst">SOC Analyst</option>
                                <option value="viewer">Viewer</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <button class="btn btn-success">Create</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card dark-card">
                <div class="card-body">
                    <h3 class="section-title">Registered Accounts</h3>
                    <div class="table-responsive">
                        <table class="table table-dark">
                            <thead><tr><th>User</th><th>Role</th><th>Action</th></tr></thead>
                            <tbody>
                            {% for user in users %}
                            <tr>
                                <td>{{ user.username }}</td>
                                <td>{{ user.role }}</td>
                                <td>
                                    {% if user.id != current_user.id %}
                                    <form action="/users/{{ user.id }}/delete" method="post" onsubmit="return confirm('Delete this user?');">
                                        <button class="btn btn-sm btn-danger">Delete</button>
                                    </form>
                                    {% endif %}
                                </td>
                            </tr>
                            {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
