<!DOCTYPE html>
<html>
<head>

<title>SecureWatch Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h1>SecureWatch SIEM Dashboard</h1>

<div class="row">

<div class="col-md-6">
<div class="card">
<div class="card-body">
<h3>{{ total_events }}</h3>
<p>Total Events</p>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card">
<div class="card-body">
<h3>{{ total_alerts }}</h3>
<p>Total Alerts</p>
</div>
</div>
</div>

</div>

<h3 class="mt-4">Recent Alerts</h3>

<table class="table">

<tr>
<th>ID</th>
<th>Severity</th>
<th>Type</th>
</tr>

{% for alert in alerts %}

<tr>

<td>{{ alert.id }}</td>

<td>{{ alert.severity }}</td>

<td>{{ alert.alert_type }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
