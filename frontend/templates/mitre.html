<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITRE ATT&CK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🎯 MITRE ATT&CK Insights</span>
        <a href="/" class="btn btn-outline-info">Dashboard</a>
    </div>
</nav>
<div class="container py-4">
    <div class="card dark-card">
        <div class="card-body">
            <h2 class="section-title">ATT&CK Techniques</h2>
            <div class="table-responsive">
                <table class="table table-dark">
                    <thead><tr><th>Technique</th><th>Tactic</th><th>Detection Count</th></tr></thead>
                    <tbody>
                    {% for technique in techniques %}
                    <tr><td>{{ technique.technique_id }} - {{ technique.name }}</td><td>{{ technique.tactic }}</td><td>{{ technique.detection_count }}</td></tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
